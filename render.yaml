services:
  - type: web
    name: agentic-ai-traveller-backend
    env: python
    buildCommand: pip install -r requirements.txt && python scripts/ingest_data.py
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER_PRIORITY
        value: gemini,groq,openrouter,openai,anthropic
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
