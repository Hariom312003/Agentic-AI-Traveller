name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check src tests frontend --output-format=github
        continue-on-error: true # style issues shouldn't block the whole build, just get flagged

      - name: Run test suite
        env:
          EMBEDDING_PROVIDER: local
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build --target api -t ai-traveller-api:ci .
      - name: Build UI image
        run: docker build --target ui -t ai-traveller-ui:ci .
